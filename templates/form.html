<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>YouTube Downloader</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        label { display: block; margin: 8px 0; }
        input[type=text] { width: 100%; padding: 8px; }
        button { padding: 10px 20px; font-size: 16px; }
        .messages { margin-top: 20px; color: green; }
    </style>
</head>
<body>
    <h1>YouTube Downloader</h1>
    <form method="post">
        <label>Video URL:<br>
            <input type="text" name="url" placeholder="https://www.youtube.com/watch?v=...">
        </label>
        <label>Save Path (optional):<br>
            <input type="text" name="save_path" placeholder="{{ default_path }}">
        </label>
        <label style="display:inline-block; margin-top:12px;">
            <input type="checkbox" name="audio_only" checked>
            Download audio only
        </label>
        <button type="submit">Download</button>
    </form>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="messages">
          <ul>
          {% for m in messages %}
            <li>{{ m }}</li>
          {% endfor %}
          </ul>
        </div>
      {% endif %}
    {% endwith %}
</body>
</html>
